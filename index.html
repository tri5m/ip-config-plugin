<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的IP</title>
    <link rel="stylesheet" href="components/message_ui.css">
    <style>
        table {
            border-collapse: collapse;
            width: 95%;
            margin-left: 3%;
            height: 300px;
            border-radius: 10%;
        }

        tr {
            border-bottom: 1px solid #bdbdbd;
            height: 30px;
        }

        tr td {
            width: 25%;
        }

        .cont {
            border: 1px solid #bdbdbd;
            width: 80%;
            margin-left: 10%;
            border-radius: .25rem;
            box-shadow: 0 4px 6px -1px #0000001a, 0 2px 4px -1px #0000000f;
        }

        .ip {
            width: 15%;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace;
        }

        .ip span {
            margin-left: 4px;
        }

        .lab {
            color: #000000;
            padding-left: 12px;
            font-size: large;
            font-weight: 400;
            width: 8%;
        }

        .des {
            color: cadetblue;
            font-size: small
        }

        .copy {
            background-image: url('assets/copy.svg');
            background-repeat: no-repeat;
            padding-left: 20px;
            cursor: pointer;
        }

        .speed_test_cont {
            margin-top: 20px;
            display: flex;
            flex-flow: row wrap;
            justify-content: space-evenly;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .stc_item {
            flex-basis: calc(100% / 5);
            border: 1px solid #e4e4e4;
            box-shadow: 0 4px 6px -1px #0000001a, 0 2px 4px -1px #0000000f;
            margin-bottom: 1.2rem;
        }

        .st_title {
            width: 100%;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 400;
        }

        .st_des {
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: #a2a2a2;
        }

        .st_time {
            width: 100%;
            text-align: center;
            font-size: 1.10rem;
            color: #009800cc;
        }

        .speed_test_cont hr {
            width: 80%;
        }

        .dns_info_cont {
            margin-top: 10px;
            height: 10rem;
        }

        .dic_title {
            width: 20%;
            font-weight: 500;
            color: darkcyan;
        }
        .dic_ip {
            width: 30%;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace;
        }
        .dic_geo {
            width: 50%;
            color: #6b7280;
        }

        .autoCopyLabel{
            display: flex;
            align-items: center;
            font-size: small;
            color: darkcyan;
        }

        .lanActions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
        }

        .lanSelect {
            position: relative;
            width: 52%;
            min-width: 72px;
            max-width: 126px;
        }

        .lanSelectNative {
            display: none;
        }

        .lanSelectTrigger {
            width: 100%;
            padding: 4px 22px 4px 8px;
            border: 1px solid #a8b0ba;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            color: #3f4752;
            background: linear-gradient(180deg, #eceff1 0%, #dfe3e7 100%);
            box-shadow: 0 1px 2px rgba(17, 24, 39, 0.08);
            cursor: pointer;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .lanSelectTrigger:hover {
            border-color: #7b8694;
            box-shadow: 0 3px 8px rgba(17, 24, 39, 0.1);
        }

        .lanSelectTrigger:focus {
            border-color: #6b7280;
            box-shadow: 0 0 0 3px rgba(107, 114, 128, 0.18);
        }

        .lanSelectTrigger::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 9px;
            width: 6px;
            height: 6px;
            border-right: 1.5px solid #6b7280;
            border-bottom: 1.5px solid #6b7280;
            transform: translateY(-65%) rotate(45deg);
            pointer-events: none;
            transition: transform 0.18s ease;
        }

        .lanSelect.is-open .lanSelectTrigger::after {
            transform: translateY(-25%) rotate(225deg);
        }

        .lanSelectLabel {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lanSelectMenu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            z-index: 40;
            width: 100%;
            max-height: 132px;
            overflow-y: auto;
            padding: 4px;
            border: 1px solid #a8b0ba;
            border-radius: 10px;
            background: #dfe3e7;
            box-shadow: 0 8px 16px rgba(17, 24, 39, 0.14);
            display: none;
        }

        .lanSelect.is-open .lanSelectMenu {
            display: block;
        }

        .lanSelectOption {
            width: 100%;
            padding: 5px 8px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #3f4752;
            font-size: 11px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .lanSelectOption:hover {
            background: #c7cfd7;
        }

        .lanSelectOption.is-active {
            background: #6b7280;
            color: #f3f4f6;
        }

        @media (prefers-color-scheme: dark) {
            .ip {
                color: #c6c6c6;
            }
            .lab {
                color: #7d7d7d;
            }
            #loc {
                color: #7d7d7d;
            }
            .st_title {
                color: #40a7b1;
            }
            .dic_ip {
                color: #c6c6c6;
            }
            .dic_geo {
                color: #7d7d7d;
            }
            .lanSelectTrigger {
                color: #d5d8dc;
                border-color: #59616c;
                background: linear-gradient(180deg, #3c434d 0%, #2a3038 100%);
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.24);
            }
            .lanSelectTrigger:hover {
                border-color: #7a838f;
                box-shadow: 0 3px 8px rgba(0, 0, 0, 0.22);
            }
            .lanSelectTrigger:focus {
                border-color: #8d96a0;
                box-shadow: 0 0 0 3px rgba(141, 150, 160, 0.18);
            }
            .lanSelectTrigger::after {
                border-right-color: #a1a8b1;
                border-bottom-color: #a1a8b1;
            }
            .lanSelectMenu {
                border-color: #59616c;
                background: #2a3038;
                box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
            }
            .lanSelectOption {
                color: #d5d8dc;
            }
            .lanSelectOption:hover {
                background: #434b56;
            }
            .lanSelectOption.is-active {
                background: #6b7280;
                color: #f3f4f6;
            }
        }

    </style>
</head>
<body>
<div class="cont">
    <table>
        <tbody>
        <tr>
            <td class="lab">内网</td>
            <td class="ip">
                <span id="lanIpv4">0.0.0.0</span>&nbsp;
                <span class="copy" onclick="copyLan()" title="复制"></span></td>
            <td class="des">
                <span id="autoCopyTips">点击复制</span><br>
                <span id="lanInterfaceDesc">自动选择网卡</span>
            </td>
            <td>
                <div class="lanActions">
                    <div id="lanInterfaceSelect" class="lanSelect">
                        <select id="lanInterfaceSelectNative" class="lanSelectNative" onchange="changeLanInterface(this)">
                            <option value="">自动</option>
                        </select>
                        <button id="lanInterfaceTrigger" class="lanSelectTrigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                            <span id="lanInterfaceLabel" class="lanSelectLabel">自动</span>
                        </button>
                        <div id="lanInterfaceMenu" class="lanSelectMenu" role="listbox"></div>
                    </div>
                    <label class="autoCopyLabel"><input id="autoCopy" type="checkbox" onchange="autoCopyCheck(this)"/>自动复制</label>
                </div>
            </td>
        </tr>
        <tr>
            <td class="lab">公网</td>
            <td class="ip">
                <span id="ip_1">0.0.0.0</span>&nbsp;
                <span class="copy" onclick="copyIp1()" title="复制"></span>
            </td>
            <td class="des"><span id="address1"></span></td>
            <td class="des"><span id="net_str1"></span></td>
        </tr>
        <tr>
            <td class="lab">国外</td>
            <td class="ip">
                <span id="ip_2">0.0.0.0</span>&nbsp;
                <span class="copy" onclick="copyIp2()" title="复制"></span>
            </td>
            <td class="des"><span id="address2"></span></td>
            <td class="des"><span id="net_str2"></span></td>
        </tr>
        <tr style="border: none">
            <td class="lab">位置</td>
            <td id="loc" colspan="2">定位中...</td>
            <td></td>
        </tr>
        </tbody>
    </table>
</div>

<div class="cont" style="margin-top: 15px">
    <div class="speed_test_cont" id="speed_test_cont"></div>
</div>

<div class="cont" style="margin-top: 15px">
    <table class="dns_info_cont" id="dns_info_cont">

    </table>
</div>



<div class="parent-tips" style="display: block; z-index: 1113;">
    <div class="global-msg-tips info">
    </div>
</div>
</body>

<script type="text/javascript">
    let lanInterfacesCache = [];
    let lanInterfaceMenuOpen = false;

    utools.onPluginEnter(({code, type, payload}) => {

        let autoCopy = localStorage.getItem('autoCopy');
        const savedLanInterface = localStorage.getItem('lanInterfaceName') || '';
        console.log("自动复制: "+autoCopy);
        if(autoCopy == null){
            localStorage.setItem('autoCopy', "true");
            document.getElementById('autoCopy').checked = true;
            autoCopy = true;
        }
        if (autoCopy=="true") {
            console.log("???");
            document.getElementById('autoCopyTips').innerText = '已复制到粘贴板';
            document.getElementById('autoCopy').checked = true;
        } else {
            console.log("###")
            document.getElementById('autoCopyTips').innerText = '点击复制ip';
            document.getElementById('autoCopy').checked = false;
        }

        loadLanInterfaces(savedLanInterface, autoCopy);

        // 获取地理信息
        window.locationInfo((address) => {
            document.getElementById("loc").innerText = address;
        }, function (error) {
            console.error(error);
        });

        // 获取外网地址1
        window.wan_no_proxy((data) => {
            document.getElementById("ip_1").innerText = data.ip;
            document.getElementById("address1").innerText = data.addr;
            document.getElementById("net_str1").innerText = data.net_str;
        }, function (error) {
            document.getElementById("ip_1").innerText = error;
            console.error(error);
        });

        // 获取外网地址2
        window.wan_has_proxy((data) => {
            document.getElementById("ip_2").innerText = data.ip;
            document.getElementById("address2").innerText = data.addr;
            document.getElementById("net_str2").innerText = data.net_str;
        }, function (error) {
            document.getElementById("ip_2").innerText = error;
            console.error(error);
        });

        // 开始测速组件
        let array = [{
            url: "https://www.baidu.com",
            name: "百度搜索",
            des: "境内网站",
            id: "1"
        }, {
            url: "https://music.163.com",
            name: "网易云",
            des: "境内网站",
            id: "2"
        }, {
            url: "https://github.com",
            name: "GitHub",
            des: "境外网站",
            id: "3"
        }, {
            url: "https://google.com",
            name: "Google",
            des: "境外网站",
            id: "4"
        }, {
            url: "https://www.aliyun.com",
            name: "阿里云",
            des: "境内网站",
            id: "5"
        }, {
            url: "https://cloud.tencent.com",
            name: "腾讯云",
            des: "境内网站",
            id: "6"
        }, {
            url: "https://youtube.com",
            name: "Youtube",
            des: "境外网站",
            id: "7"
        }, {
            url: "https://www.amazon.com",
            name: "亚马逊",
            des: "境外网站",
            id: "8"
        }
        ];
        testNetDelay(array);

        // DNS出口查询
        dnsExitQuery()
    })

    document.addEventListener("click", (event) => {
        const select = document.getElementById("lanInterfaceSelect");
        if (!select || select.contains(event.target)) {
            return;
        }
        closeLanInterfaceMenu();
    });

    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
            closeLanInterfaceMenu();
        }
    });

    document.addEventListener("DOMContentLoaded", () => {
        const trigger = document.getElementById("lanInterfaceTrigger");
        if (trigger) {
            trigger.addEventListener("click", toggleLanInterfaceMenu);
        }
    });

    function loadLanInterfaces(selectedInterfaceId, autoCopy){
        window.getLanIPv4Interfaces((interfaces) => {
            lanInterfacesCache = interfaces || [];
            renderLanInterfaceOptions(selectedInterfaceId);
            refreshLanIp(selectedInterfaceId, autoCopy);
        });
    }

    function renderLanInterfaceOptions(selectedInterfaceId){
        const select = document.getElementById("lanInterfaceSelectNative");
        const menu = document.getElementById("lanInterfaceMenu");
        select.innerHTML = "";
        menu.innerHTML = "";

        const autoOption = document.createElement("option");
        autoOption.value = "";
        autoOption.textContent = "Auto";
        select.appendChild(autoOption);

        appendLanInterfaceMenuOption("", "Auto", selectedInterfaceId);

        lanInterfacesCache.forEach(item => {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.name;
            select.appendChild(option);

            appendLanInterfaceMenuOption(item.id, item.name, selectedInterfaceId);
        });

        const selectedExists = selectedInterfaceId &&
            lanInterfacesCache.some(item => item.id === selectedInterfaceId);
        select.value = selectedExists ? selectedInterfaceId : "";
        updateLanInterfaceLabel(select.value);
    }

    function appendLanInterfaceMenuOption(value, label, selectedInterfaceId) {
        const menu = document.getElementById("lanInterfaceMenu");
        const option = document.createElement("button");
        option.type = "button";
        option.className = "lanSelectOption";
        option.textContent = label;
        option.dataset.value = value;
        option.setAttribute("role", "option");
        option.setAttribute("aria-selected", value === (selectedInterfaceId || "") ? "true" : "false");
        if (value === (selectedInterfaceId || "")) {
            option.classList.add("is-active");
        }
        option.addEventListener("click", () => {
            setLanInterfaceValue(value);
            closeLanInterfaceMenu();
        });
        menu.appendChild(option);
    }

    function updateLanInterfaceLabel(value) {
        const label = document.getElementById("lanInterfaceLabel");
        const matched = lanInterfacesCache.find(item => item.id === value);
        label.innerText = matched ? matched.name : "Auto";
        syncLanInterfaceMenuState(value);
    }

    function syncLanInterfaceMenuState(value) {
        document.querySelectorAll(".lanSelectOption").forEach((option) => {
            const active = option.dataset.value === value;
            option.classList.toggle("is-active", active);
            option.setAttribute("aria-selected", active ? "true" : "false");
        });
    }

    function toggleLanInterfaceMenu() {
        if (lanInterfaceMenuOpen) {
            closeLanInterfaceMenu();
        } else {
            openLanInterfaceMenu();
        }
    }

    function openLanInterfaceMenu() {
        lanInterfaceMenuOpen = true;
        const select = document.getElementById("lanInterfaceSelect");
        const trigger = document.getElementById("lanInterfaceTrigger");
        select.classList.add("is-open");
        trigger.setAttribute("aria-expanded", "true");
    }

    function closeLanInterfaceMenu() {
        lanInterfaceMenuOpen = false;
        const select = document.getElementById("lanInterfaceSelect");
        const trigger = document.getElementById("lanInterfaceTrigger");
        select.classList.remove("is-open");
        trigger.setAttribute("aria-expanded", "false");
    }

    function setLanInterfaceValue(interfaceId) {
        const select = document.getElementById("lanInterfaceSelectNative");
        select.value = interfaceId;
        updateLanInterfaceLabel(interfaceId);
        changeLanInterface(select);
    }

    function refreshLanIp(selectedInterfaceId, autoCopy){
        window.lanIPv4((ip) => {
            const ipText = ip || "未找到可用IPv4";
            document.getElementById("lanIpv4").innerText = ipText;
            updateLanInterfaceDesc(selectedInterfaceId, ip);
            if(autoCopy=="true" && ip){
                console.log("已自动复制")
                utools.copyText(ip);
            }
        }, selectedInterfaceId);
    }

    function updateLanInterfaceDesc(selectedInterfaceId, ip){
        const desc = document.getElementById("lanInterfaceDesc");
        if (!lanInterfacesCache.length) {
            desc.innerText = "未找到可用网卡";
            return;
        }

        const matched = selectedInterfaceId
            ? lanInterfacesCache.find(item => item.id === selectedInterfaceId)
            : lanInterfacesCache.find(item => item.address === ip) || lanInterfacesCache[0];

        if (!matched) {
            desc.innerText = "自动选择网卡";
            return;
        }

        desc.innerText = matched.name + " / " + matched.address;
    }

    function autoCopyCheck(dom){
        if(dom.checked){
            localStorage.setItem('autoCopy', "true")
            console.log("开启自动复制")
        }else{
            localStorage.setItem('autoCopy', "false")
            console.log("关闭自动复制")
        }
    }

    function changeLanInterface(dom) {
        const interfaceId = dom.value || "";
        localStorage.setItem('lanInterfaceName', interfaceId);
        updateLanInterfaceLabel(interfaceId);
        refreshLanIp(interfaceId, localStorage.getItem('autoCopy'));
    }

    function copyLan() {
        utools.copyText(document.getElementById("lanIpv4").innerText)
        confetti();
    }

    function copyIp1() {
        utools.copyText(document.getElementById("ip_1").innerText)
        confetti();
    }

    function copyIp2() {
        utools.copyText(document.getElementById("ip_2").innerText)
        confetti();
    }

    // 测延迟
    function testNetDelay(array) {
        document.getElementById("speed_test_cont").innerHTML = "";
        // 创建dom
        array.forEach(e => {
            // 创建div元素
            let div = document.createElement("div");
            div.classList.add("stc_item");

            let pTitle = document.createElement("p");
            pTitle.classList.add("st_title");
            pTitle.innerText = e.name;

            let pDes = document.createElement("p");
            pDes.classList.add("st_des");
            pDes.innerText = e.des;

            let hr = document.createElement("hr");

            let pTime = document.createElement("p");
            pTime.innerText = "测速中...";
            pTime.classList.add("st_time");
            pTime.id = "st_time_item_" + e.id;

            div.appendChild(pTitle);
            div.appendChild(pDes);
            div.appendChild(hr);
            div.appendChild(pTime);
            document.getElementById("speed_test_cont").appendChild(div);
        });
        let startTime = new Date().getTime();
        array.forEach(function (element) {
            fetch(element.url).then(r => {
                let endTime = new Date().getTime();
                let latency = endTime - startTime;
                if (latency > 1000) {
                    document.getElementById("st_time_item_" + element.id).style.color = "origin";
                }
                if (latency > 3000) {
                    document.getElementById("st_time_item_" + element.id).style.color = "yellow";
                }
                if (latency > 7000) {
                    document.getElementById("st_time_item_" + element.id).style.color = "red";
                }
                document.getElementById("st_time_item_" + element.id).innerText = latency + "ms"
            }).catch(function (error) {
                document.getElementById("st_time_item_" + element.id).innerText = "❌";
                document.getElementById("st_time_item_" + element.id).style.color = "red";
                console.error(error);
            });
        });
    }

    // DNS出口查询
    function dnsExitQuery(){
        document.getElementById("dns_info_cont").innerHTML = "";

        // 从ip.skk.moe的接口拿一些
        fetch("https://o8wqrg29oc8.ipv4.surfsharkdns.com").then(response => {
            console.log(response);
            if(!response.ok){
                return;
            }
            response.json().then((json) => {
                Object.keys(json).forEach(ip => {
                    const details = json[ip];
                    let tr = document.createElement("tr");
                    let td1 = document.createElement("td");
                    td1.className = "dic_title";
                    td1.textContent = "DNS out";

                    let td2 = document.createElement("td");
                    td2.className = "dic_ip";
                    td2.textContent = ip;

                    let td3 = document.createElement("td");
                    td3.className = "dic_geo";
                    td3.textContent = details.Country + " " + details.City + " " + details.ISP;

                    tr.appendChild(td1);
                    tr.appendChild(td2);
                    tr.appendChild(td3);

                    document.getElementById("dns_info_cont").appendChild(tr);
                });

            });
        }).catch(e => {
            console.error(e);
        });

        for (let i = 0; i < 4; i++) {

            fetch("https://"+generateRandomString(32)+".edns.ip-api.com/json?lang=zh-CN").then(response =>  {
                console.log(response);
                response.json().then((res) => {
                    let tr = document.createElement("tr");
                    let td1 = document.createElement("td");
                    td1.className = "dic_title";
                    td1.textContent = "DNS out";

                    let td2 = document.createElement("td");
                    td2.className = "dic_ip";
                    td2.textContent = res.dns.ip;

                    let td3 = document.createElement("td");
                    td3.className = "dic_geo";
                    td3.textContent = res.dns.geo;

                    tr.appendChild(td1);
                    tr.appendChild(td2);
                    tr.appendChild(td3);

                    document.getElementById("dns_info_cont").appendChild(tr);
                }).catch(e => {
                    console.error(e);
                });
            }).catch(error => {
                console.error(error);
            });
        }

        function generateRandomString(length) {
            let characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';

            for (let i = 0; i < length; i++) {
                let randomIndex = Math.floor(Math.random() * characters.length);
                result += characters.charAt(randomIndex);
            }

            return result;
        }
    }
</script>

</html>
